<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PIE CUP Results & Fixtures</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>PIE CUP</h1>
    <p>Past results, upcoming fixtures, tournament progression and top performers.</p>
  </header>

  <main>
    <section>
      <h2>Upcoming Fixtures</h2>
      <div id="upcoming-list" class="card-grid"></div>
    </section>

    <section>
      <h2>Latest Results</h2>
      <div id="past-results" class="card-grid"></div>
    </section>

    <section>
      <h2>Ongoing / Recent Match</h2>
      <div id="ongoing-match" class="card"></div>
    </section>

    <section>
      <h2>Tournament Progression</h2>
      <div id="progression" class="card"></div>
    </section>

    <section>
      <h2>Top Tournament Stats</h2>
      <div class="stats-grid">
        <div class="stat-card"><h3>Top Scorers</h3><ul id="top-scorers"></ul></div>
        <div class="stat-card"><h3>Top Assists</h3><ul id="top-assists"></ul></div>
        <div class="stat-card"><h3>Most Yellow Cards</h3><ul id="top-yellow"></ul></div>
      </div>
    </section>
  </main>

  <footer>
    <p>View the admin dashboard at <a href="admin.html">Admin Dashboard</a></p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
